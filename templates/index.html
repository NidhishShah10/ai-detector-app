<!DOCTYPE html>
<html>

<head>
    <title>AI Detector App</title>
</head>

<body>

<h1>AI Essay Detector</h1>

<form method="POST">
<textarea name="essay" rows="10" cols="60" placeholder="Paste your essay here"></textarea>
<br><br>

<button type="submit">Analyze Essay</button>
</form>

{% if result %}
<h3>Result: {{ result.label }}</h3>
<p>AI Probability: {{ result.score }}%</p>
{% endif %}

</body>
</html>
